<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamBox - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                            400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                            800: '#1e40af', 900: '#1e3a8a', 950: '#172554'
                        },
                        accent: {
                            50: '#fef2f2', 100: '#fee2e2', 200: '#fecaca', 300: '#fca5a5',
                            400: '#f87171', 500: '#ef4444', 600: '#dc2626', 700: '#b91c1c',
                            800: '#991b1b', 900: '#7f1d1d', 950: '#450a0a'
                        }
                    }
                }
            }
        };
    </script>
    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slide-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        .animate-scale-in { animation: scale-in 0.2s ease-out forwards; }
        .animate-slide-up { animation: slide-up 0.3s ease-out forwards; }
        
        [data-focusable] {
            outline: none;
            transition: all 0.2s ease-out;
        }
        .dpad-focused {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5), 0 0 25px rgba(59, 130, 246, 0.4);
            transform: scale(1.08);
            z-index: 20;
            border-radius: 0.75rem;
        }
        .dark .dpad-focused {
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.5), 0 0 25px rgba(96, 165, 250, 0.4);
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            border: 4px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .dark .spinner {
            border-color: rgba(96, 165, 250, 0.2);
            border-top-color: #60a5fa;
        }

        /* Hide scrollbar for horizontal scrolling but keep functionality */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .scroll-container {
            scroll-behavior: smooth;
        }
        .card-snap {
            scroll-snap-align: start;
        }
        
        /* Section title glow when focused */
        .section-focused h2 {
            color: #3b82f6;
        }
        .dark .section-focused h2 {
            color: #60a5fa;
        }
        .section-focused::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 70%;
            background: #3b82f6;
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-black text-slate-900 dark:text-white min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-black/95 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 sm:h-20">
                <div class="flex items-center gap-3">
                    <button onclick="window.location.href='/home.html'" class="flex items-center gap-2 group" data-focusable>
                        <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center shadow-lg group-hover:shadow-primary-500/30 transition-shadow">
                            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <span class="text-xl sm:text-2xl font-bold bg-gradient-to-r from-primary-600 to-primary-400 dark:from-primary-400 dark:to-primary-600 bg-clip-text text-transparent">StreamBox</span>
                    </button>
                </div>

                <nav class="flex items-center gap-1 sm:gap-2" id="main-nav">
                    <a href="/home.html" class="nav-item px-4 py-2 sm:px-5 sm:py-2.5 text-base sm:text-lg font-medium rounded-lg text-primary-600 dark:text-primary-400 bg-slate-100 dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-primary-500" data-focusable>Home</a>
                    <a href="/search.html" class="nav-item px-4 py-2 sm:px-5 sm:py-2.5 text-base sm:text-lg font-medium rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-900 hover:text-primary-600 dark:hover:text-primary-400 transition-all focus:outline-none focus:ring-2 focus:ring-primary-500" data-focusable>Search</a>
                    <a href="/library.html" class="nav-item px-4 py-2 sm:px-5 sm:py-2.5 text-base sm:text-lg font-medium rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-900 hover:text-primary-600 dark:hover:text-primary-400 transition-all focus:outline-none focus:ring-2 focus:ring-primary-500" data-focusable>Library</a>
                </nav>

                <div class="flex items-center gap-2 sm:gap-3">
                    <button onclick="toggleDarkMode()" class="p-2.5 sm:p-3 rounded-xl text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-900 transition-all focus:outline-none focus:ring-2 focus:ring-primary-500" data-focusable aria-label="Toggle dark mode">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        <svg class="w-5 h-5 sm:w-6 sm:h-6 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                    <button onclick="handleAuthClick()" class="px-4 py-2 sm:px-5 sm:py-2.5 text-base sm:text-lg font-medium rounded-lg bg-primary-600 hover:bg-primary-700 text-white shadow-lg hover:shadow-primary-600/30 transition-all focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:focus:ring-offset-black" data-focusable id="auth-btn">Sign In</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6 sm:py-8 pb-20">
        
        <!-- Loading State -->
        <div id="global-loader" class="flex flex-col items-center justify-center py-24 animate-fade-in">
            <div class="spinner w-14 h-14"></div>
            <p class="mt-6 text-lg text-slate-500 dark:text-slate-400 animate-pulse">Loading your entertainment...</p>
        </div>

        <!-- Content Sections Container -->
        <div id="sections-container" class="flex flex-col gap-8 sm:gap-10 hidden">
            <!-- Sections will be injected here -->
        </div>

        <!-- Empty/Error State -->
        <div id="error-state" class="hidden flex-col items-center justify-center py-24 animate-fade-in">
            <svg class="w-20 h-20 text-slate-300 dark:text-slate-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <h3 class="text-xl font-semibold text-slate-700 dark:text-slate-300">Unable to load content</h3>
            <p class="text-slate-500 dark:text-slate-500 mt-2 mb-6">Please check your connection and try again.</p>
            <button onclick="loadContent()" class="px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white rounded-xl font-medium transition-colors focus:ring-2 focus:ring-primary-500 outline-none" data-focusable>Retry</button>
        </div>

    </main>

    <!-- Scripts -->
    <script src="/app.js"></script>
    <script src="/auth-client.js"></script>
    <script>
        // Configuration for sections
        const sectionsConfig = [
            { id: 'trending', title: 'In tendenza', endpoint: '/api/content/trending' },
            { id: 'movies', title: 'Film popolari', endpoint: '/api/content/movies' },
            { id: 'series', title: 'Serie TV', endpoint: '/api/content/series' },
            { id: 'anime', title: 'Anime', endpoint: '/api/content/anime' },
            { id: 'continue', title: 'Continue Watching', endpoint: '/api/user/continue-watching', authRequired: true }
        ];

        // State for D-pad navigation
        const HomeNav = {
            sections: [],
            currentSectionIndex: 0,
            currentCardIndices: {}, // Map sectionId -> cardIndex
            enabled: false,

            init() {
                this.currentCardIndices = {};
                sectionsConfig.forEach(s => this.currentCardIndices[s.id] = 0);
                this.enabled = true;
            },

            setSectionsData(data) {
                this.sections = data;
            },

            focusSection(sectionIndex) {
                if (sectionIndex < 0 || sectionIndex >= this.sections.length) return;
                
                // Update UI for previous section
                const prevSection = document.querySelector(`[data-section-id="${this.sections[this.currentSectionIndex].id}"]`);
                if (prevSection) prevSection.classList.remove('section-focused');

                this.currentSectionIndex = sectionIndex;
                const sectionId = this.sections[sectionIndex].id;
                
                // Update UI for new section
                const newSection = document.querySelector(`[data-section-id="${sectionId}"]`);
                if (newSection) {
                    newSection.classList.add('section-focused');
                    newSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }

                this.focusCard(sectionId, this.currentCardIndices[sectionId]);
            },

            focusCard(sectionId, cardIndex) {
                const sectionEl = document.querySelector(`[data-section-id="${sectionId}"]`);
                if (!sectionEl) return;

                const cards = sectionEl.querySelectorAll('[data-card-focusable]');
                if (cards.length === 0) return;

                // Clamp index
                const safeIndex = Math.max(0, Math.min(cardIndex, cards.length - 1));
                this.currentCardIndices[sectionId] = safeIndex;

                // Remove focus from all cards in this section
                cards.forEach(c => c.classList.remove('dpad-focused'));

                // Add focus to target card
                const card = cards[safeIndex];
                card.classList.add('dpad-focused');
                
                // Scroll card into view within the horizontal container
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            },

            moveLeft() {
                const sectionId = this.sections[this.currentSectionIndex].id;
                const cards = document.querySelector(`[data-section-id="${sectionId}"]`)?.querySelectorAll('[data-card-focusable]');
                if (!cards) return;
                
                const newIndex = this.currentCardIndices[sectionId] - 1;
                if (newIndex >= 0) {
                    this.focusCard(sectionId, newIndex);
                }
            },

            moveRight() {
                const sectionId = this.sections[this.currentSectionIndex].id;
                const cards = document.querySelector(`[data-section-id="${sectionId}"]`)?.querySelectorAll('[data-card-focusable]');
                if (!cards) return;

                const newIndex = this.currentCardIndices[sectionId] + 1;
                if (newIndex < cards.length) {
                    this.focusCard(sectionId, newIndex);
                }
            },

            moveUp() {
                if (this.currentSectionIndex > 0) {
                    this.focusSection(this.currentSectionIndex - 1);
                } else {
                    // Move focus to header nav
                    const firstNav = document.querySelector('nav [data-focusable]');
                    if (firstNav) {
                        this.blurCurrent();
                        firstNav.focus(); // Use native focus for nav items
                    }
                }
            },

            moveDown() {
                if (this.currentSectionIndex < this.sections.length - 1) {
                    this.focusSection(this.currentSectionIndex + 1);
                }
            },

            select() {
                const sectionId = this.sections[this.currentSectionIndex].id;
                const cards = document.querySelector(`[data-section-id="${sectionId}"]`)?.querySelectorAll('[data-card-focusable]');
                if (cards && cards[this.currentCardIndices[sectionId]]) {
                    cards[this.currentCardIndices[sectionId]].click();
                }
            },

            blurCurrent() {
                if (this.sections.length === 0) return;
                const sectionId = this.sections[this.currentSectionIndex].id;
                const card = document.querySelector(`[data-section-id="${sectionId}"]`)?.querySelectorAll('[data-card-focusable]')[this.currentCardIndices[sectionId]];
                if (card) card.classList.remove('dpad-focused');
                
                const sectionEl = document.querySelector(`[data-section-id="${sectionId}"]`);
                if (sectionEl) sectionEl.classList.remove('section-focused');
            },
            
            // Called when focus returns from header to content
            regainFocus() {
                if (this.sections.length > 0) {
                    this.focusSection(this.currentSectionIndex);
                }
            }
        };

        // Helper to get quality badge color
        function getQualityBadge(quality) {
            const q = (quality || 'HD').toUpperCase();
            const colors = {
                '4K': 'bg-green-500 text-white',
                'HD': 'bg-blue-500 text-white',
                'SD': 'bg-yellow-500 text-black'
            };
            return colors[q] || 'bg-slate-500 text-white';
        }

        // Render a single content card
        function createCard(item, type = 'poster') {
            const imageUrl = item.poster_url || `https://picsum.photos/seed/${item.id}/300/450`;
            const qualityClass = getQualityBadge(item.quality);
            
            return `
                <button 
                    data-card-focusable
                    onclick="openDetail(${item.id})"
                    class="card-snap shrink-0 w-36 sm:w-40 md:w-44 lg:w-48 group focus:outline-none cursor-pointer"
                >
                    <div class="relative aspect-[2/3] rounded-lg overflow-hidden bg-slate-200 dark:bg-slate-800 shadow-md">
                        <img 
                            src="${imageUrl}" 
                            alt="${item.title}" 
                            class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110"
                            loading="lazy"
                            onerror="this.src='https://picsum.photos/seed/${item.id}/300/450'"
                        >
                        <div class="absolute top-2 right-2 px-2 py-0.5 text-xs font-bold rounded ${qualityClass} shadow-sm">
                            ${item.quality || 'HD'}
                        </div>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <div class="absolute bottom-0 left-0 right-0 p-3 transform translate-y-2 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-300">
                            <div class="flex items-center gap-1 text-yellow-400 text-xs mb-1">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                                <span>${item.rating || 'N/A'}</span>
                            </div>
                            <div class="flex items-center gap-1 text-white text-[10px] sm:text-xs">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                Play
                            </div>
                        </div>
                    </div>
                    <h3 class="mt-3 text-sm sm:text-base font-medium text-slate-800 dark:text-slate-200 line-clamp-1 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors">${item.title}</h3>
                    <p class="text-xs text-slate-500 dark:text-slate-400">${item.year || ''} • ${item.type}</p>
                </button>
            `;
        }

        // Create a progress bar for Continue Watching
        function createProgressBar(current, total) {
            if (!total || total <= 0) return '';
            const percent = Math.min(100, Math.max(0, (current / total) * 100));
            return `
                <div class="absolute bottom-0 left-0 right-0 h-1 bg-black/50">
                    <div class="h-full bg-primary-500" style="width: ${percent}%"></div>
                </div>
            `;
        }

        // Create Continue Watching card
        function createContinueCard(item) {
            const imageUrl = item.backdrop_url || item.poster_url || `https://picsum.photos/seed/${item.id}/400/225`;
            const percent = item.duration_seconds > 0 ? (item.progress_seconds / item.duration_seconds) * 100 : 0;
            
            return `
                <button 
                    data-card-focusable
                    onclick="openDetail(${item.content_id})"
                    class="card-snap shrink-0 w-64 sm:w-72 md:w-80 group focus:outline-none cursor-pointer"
                >
                    <div class="relative aspect-video rounded-lg overflow-hidden bg-slate-200 dark:bg-slate-800 shadow-md">
                        <img 
                            src="${imageUrl}" 
                            alt="${item.title}" 
                            class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"
                            loading="lazy"
                        >
                        ${createProgressBar(item.progress_seconds, item.duration_seconds)}
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center">
                                <svg class="w-6 h-6 text-white ml-1" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>
                            </div>
                        </div>
                        <div class="absolute bottom-2 left-2 bg-black/70 text-white text-xs px-2 py-1 rounded">
                            ${Math.floor(percent)}% watched
                        </div>
                    </div>
                    <h3 class="mt-3 text-sm font-medium text-slate-800 dark:text-slate-200 line-clamp-1">${item.title}</h3>
                    <p class="text-xs text-slate-500 dark:text-slate-400">${item.episode_title || 'Continue watching'}</p>
                </button>
            `;
        }

        // Render a section
        function renderSection(config, data) {
            if (!data || data.length === 0) return '';

            const cardsHtml = config.id === 'continue' 
                ? data.map(item => createContinueCard(item)).join('')
                : data.map(item => createCard(item)).join('');

            return `
                <section 
                    data-section-id="${config.id}" 
                    class="relative pl-4 sm:pl-6 transition-all duration-300 border-l-4 border-transparent"
                >
                    <div class="flex items-center justify-between mb-4 pr-4">
                        <h2 class="text-xl sm:text-2xl font-bold text-slate-800 dark:text-white transition-colors">${config.title}</h2>
                        <span class="text-xs text-slate-500 dark:text-slate-500 uppercase tracking-wider font-semibold">${data.length} items</span>
                    </div>
                    
                    <div class="scroll-container flex gap-4 overflow-x-auto pb-4 scrollbar-hide" id="scroll-${config.id}">
                        ${cardsHtml}
                    </div>
                </section>
            `;
        }

        // Main loading function
        async function loadContent() {
            const loader = document.getElementById('global-loader');
            const container = document.getElementById('sections-container');
            const errorState = document.getElementById('error-state');

            try {
                // Reset UI
                loader.classList.remove('hidden');
                loader.classList.add('flex');
                container.classList.add('hidden');
                container.innerHTML = '';
                errorState.classList.add('hidden');
                errorState.classList.remove('flex');

                const sectionsToLoad = [];

                // Prepare requests
                for (const config of sectionsConfig) {
                    if (config.authRequired && !window.StreamBox.Auth.isAuthenticated()) {
                        continue;
                    }
                    sectionsToLoad.push(config);
                }

                // Fetch all data in parallel
                const fetchPromises = sectionsToLoad.map(async (config) => {
                    try {
                        const response = await window.StreamBox.API.get(config.endpoint);
                        return { config, data: response.data || [] };
                    } catch (err) {
                        console.error(`Failed to load ${config.title}:`, err);
                        return { config, data: [] };
                    }
                });

                const results = await Promise.all(fetchPromises);
                
                // Filter out empty sections
                const validSections = results.filter(r => r.data && r.data.length > 0);

                if (validSections.length === 0) {
                    throw new Error('No content available');
                }

                // Render sections
                validSections.forEach(({ config, data }) => {
                    const html = renderSection(config, data);
                    if (html) {
                        container.insertAdjacentHTML('beforeend', html);
                    }
                });

                // Switch UI
                loader.classList.add('hidden');
                loader.classList.remove('flex');
                container.classList.remove('hidden');

                // Initialize D-pad navigation
                HomeNav.setSectionsData(validSections.map(r => r.config));
                HomeNav.init();
                HomeNav.focusSection(0);

            } catch (err) {
                console.error('Content loading failed:', err);
                loader.classList.add('hidden');
                loader.classList.remove('flex');
                container.classList.add('hidden');
                errorState.classList.remove('hidden');
                errorState.classList.add('flex');
            }
        }

        // Navigation actions
        function openDetail(id) {
            window.StreamBox.PageTransition.navigate(`/detail.html?id=${id}`);
        }

        function toggleDarkMode() {
            if (window.StreamBox && window.StreamBox.DarkMode) {
                window.StreamBox.DarkMode.toggle();
            }
        }

        function handleAuthClick() {
            if (window.StreamBox && window.StreamBox.Auth) {
                if (window.StreamBox.Auth.isAuthenticated()) {
                    window.StreamBox.Auth.logout();
                } else {
                    window.StreamBox.PageTransition.navigate('/login.html');
                }
            }
        }

        // Update auth button state
        function updateUI() {
            const authBtn = document.getElementById('auth-btn');
            if (window.StreamBox && window.StreamBox.Auth && authBtn) {
                const isAuthenticated = window.StreamBox.Auth.isAuthenticated();
                authBtn.textContent = isAuthenticated ? 'Sign Out' : 'Sign In';
            }
        }

        // Custom Key Handler for Home Page
        document.addEventListener('keydown', (e) => {
            if (!HomeNav.enabled) return;

            // If focus is on nav or header, let default handling happen unless it's Down
            const activeElement = document.activeElement;
            const isInHeader = activeElement.closest('header');
            
            if (isInHeader) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    HomeNav.regainFocus();
                }
                return;
            }

            // Handle D-pad within content
            switch (e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    HomeNav.moveLeft();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    HomeNav.moveRight();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    HomeNav.moveUp();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    HomeNav.moveDown();
                    break;
                case 'Enter':
                    e.preventDefault();
                    HomeNav.select();
                    break;
            }
        });

        // Handle Tizen remote keys
        if (window.tizen) {
            document.addEventListener('tizenkeydown', (e) => {
                const keyMap = {
                    'Left': 'ArrowLeft',
                    'Right': 'ArrowRight',
                    'Up': 'ArrowUp',
                    'Down': 'ArrowDown',
                    'Enter': 'Enter'
                };
                const mappedKey = keyMap[e.keyName];
                if (mappedKey) {
                    const event = new KeyboardEvent('keydown', { key: mappedKey });
                    document.dispatchEvent(event);
                }
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            loadContent();
        });
    </script>
</body>
</html>
