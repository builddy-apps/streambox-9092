<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamBox - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                            950: '#172554'
                        },
                        accent: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            300: '#fca5a5',
                            400: '#f87171',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            800: '#991b1b',
                            900: '#7f1d1d',
                            950: '#450a0a'
                        }
                    }
                }
            }
        };
    </script>
    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slide-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        .animate-scale-in { animation: scale-in 0.2s ease-out forwards; }
        .animate-slide-up { animation: slide-up 0.3s ease-out forwards; }
        
        [data-focusable] {
            outline: none;
            transition: all 0.2s ease-out;
        }
        .dpad-focused {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5), 0 0 20px rgba(59, 130, 246, 0.3);
            transform: scale(1.02);
            z-index: 10;
        }
        .dark .dpad-focused {
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.5), 0 0 20px rgba(96, 165, 250, 0.3);
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            border: 3px solid currentColor;
            border-opacity: 0.2;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-black text-slate-900 dark:text-white transition-colors duration-300">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-40 bg-white/90 dark:bg-black/90 backdrop-blur-sm border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-primary-500 to-accent-500 bg-clip-text text-transparent">
                StreamBox
            </h1>
            <button 
                id="darkModeToggle" 
                data-focusable="true"
                type="button"
                class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all duration-200 focus:ring-2 focus:ring-primary-500"
                aria-label="Toggle dark mode">
                <svg id="sunIcon" class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
                <svg id="moonIcon" class="w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="min-h-screen flex items-center justify-center px-6 pt-20">
        <div class="w-full max-w-md animate-slide-up">
            <!-- Logo/Brand -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-primary-500 to-accent-500 mb-4 shadow-lg">
                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <h2 class="text-3xl font-bold text-slate-900 dark:text-white" id="formTitle">Welcome Back</h2>
                <p class="text-slate-600 dark:text-slate-400 mt-2 text-lg" id="formSubtitle">Sign in to continue watching</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden mb-6 p-4 bg-accent-100 dark:bg-accent-900/30 border border-accent-300 dark:border-accent-700 rounded-xl flex items-center gap-3 animate-fade-in">
                <svg class="w-6 h-6 text-accent-600 dark:text-accent-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span id="errorText" class="text-accent-800 dark:text-accent-200"></span>
                <button type="button" id="dismissError" class="ml-auto text-accent-600 dark:text-accent-400 hover:text-accent-800 dark:hover:text-accent-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- Auth Form -->
            <form id="authForm" class="space-y-6">
                <!-- Name Field (Signup only) -->
                <div id="nameField" class="hidden">
                    <label for="name" class="block text-lg font-medium text-slate-700 dark:text-slate-300 mb-2">Name</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name"
                        data-focusable="true"
                        class="w-full px-6 py-4 text-lg bg-white dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-700 rounded-xl focus:border-primary-500 dark:focus:border-primary-400 focus:ring-4 focus:ring-primary-500/20 transition-all duration-200 text-slate-900 dark:text-white placeholder-slate-400"
                        placeholder="Enter your name"
                        autocomplete="name">
                </div>

                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-lg font-medium text-slate-700 dark:text-slate-300 mb-2">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        data-focusable="true"
                        class="w-full px-6 py-4 text-lg bg-white dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-700 rounded-xl focus:border-primary-500 dark:focus:border-primary-400 focus:ring-4 focus:ring-primary-500/20 transition-all duration-200 text-slate-900 dark:text-white placeholder-slate-400"
                        placeholder="Enter your email"
                        autocomplete="email">
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-lg font-medium text-slate-700 dark:text-slate-300 mb-2">Password</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            data-focusable="true"
                            class="w-full px-6 py-4 pr-14 text-lg bg-white dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-700 rounded-xl focus:border-primary-500 dark:focus:border-primary-400 focus:ring-4 focus:ring-primary-500/20 transition-all duration-200 text-slate-900 dark:text-white placeholder-slate-400"
                            placeholder="Enter your password"
                            autocomplete="current-password">
                        <button 
                            type="button" 
                            id="togglePassword"
                            data-focusable="true"
                            class="absolute right-4 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors"
                            aria-label="Toggle password visibility">
                            <svg id="eyeOpen" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                            <svg id="eyeClosed" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center">
                    <input 
                        type="checkbox" 
                        id="remember" 
                        name="remember"
                        data-focusable="true"
                        class="w-6 h-6 rounded border-slate-300 dark:border-slate-700 text-primary-600 focus:ring-primary-500 bg-white dark:bg-slate-900 cursor-pointer">
                    <label for="remember" class="ml-3 text-lg text-slate-700 dark:text-slate-300 cursor-pointer">Remember me</label>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="submitBtn"
                    data-focusable="true"
                    class="w-full py-4 px-6 text-lg font-semibold text-white bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-700 hover:to-primary-600 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200 focus:ring-4 focus:ring-primary-500/50 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3">
                    <span id="submitText">Sign In</span>
                    <div id="submitSpinner" class="w-6 h-6 spinner hidden"></div>
                    <svg id="submitArrow" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </form>

            <!-- Toggle Mode -->
            <div class="mt-8 text-center">
                <p class="text-lg text-slate-600 dark:text-slate-400">
                    <span id="toggleText">Don't have an account?</span>
                    <button 
                        type="button" 
                        id="toggleMode"
                        data-focusable="true"
                        class="ml-2 text-primary-600 dark:text-primary-400 hover:text-primary-700 dark:hover:text-primary-300 font-semibold transition-colors focus:underline underline-offset-4">
                        Sign Up
                    </button>
                </p>
            </div>

            <!-- Back Button (for TV) -->
            <div class="mt-6 text-center">
                <button 
                    type="button" 
                    id="backBtn"
                    data-focusable="true"
                    class="inline-flex items-center gap-2 px-6 py-3 text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    <span class="text-lg">Back</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Load App Scripts -->
    <script src="app.js"></script>
    <script src="auth-client.js"></script>

    <script>
        // Login Page Logic
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('authForm');
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');
            const submitArrow = document.getElementById('submitArrow');
            const darkModeToggle = document.getElementById('darkModeToggle');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeClosed = document.getElementById('eyeClosed');
            const toggleModeBtn = document.getElementById('toggleMode');
            const formTitle = document.getElementById('formTitle');
            const formSubtitle = document.getElementById('formSubtitle');
            const toggleText = document.getElementById('toggleText');
            const nameField = document.getElementById('nameField');
            const nameInput = document.getElementById('name');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const dismissError = document.getElementById('dismissError');
            const backBtn = document.getElementById('backBtn');

            let isLoginMode = true;

            // Initialize D-pad navigation
            setTimeout(() => {
                const focusables = document.querySelectorAll('[data-focusable]');
                focusables.forEach((el, index) => {
                    el.addEventListener('focus', () => {
                        el.classList.add('dpad-focused');
                    });
                    el.addEventListener('blur', () => {
                        el.classList.remove('dpad-focused');
                    });
                });
                if (focusables.length > 0) {
                    focusables[0].focus();
                }
            }, 100);

            // Dark mode toggle
            darkModeToggle.addEventListener('click', () => {
                if (window.StreamBox && window.StreamBox.DarkMode) {
                    window.StreamBox.DarkMode.toggle();
                }
            });

            // Form submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = passwordInput.value;
                const name = nameInput.value.trim();
                const remember = document.getElementById('remember').checked;

                if (!email || !password) {
                    showError('Please fill in all required fields');
                    return;
                }

                if (!isLoginMode && !name) {
                    showError('Please enter your name');
                    nameInput.focus();
                    return;
                }

                setLoading(true);
                hideError();

                try {
                    let result;
                    if (isLoginMode) {
                        result = await window.StreamBox.Auth.login(email, password);
                    } else {
                        result = await window.StreamBox.Auth.register(email, password, name);
                    }

                    if (result.success) {
                        if (remember) {
                            localStorage.setItem('rememberEmail', email);
                        } else {
                            localStorage.removeItem('rememberEmail');
                        }
                        window.location.href = '/index.html';
                    } else {
                        showError(result.error || 'Authentication failed');
                    }
                } catch (error) {
                    showError(error.message || 'An unexpected error occurred');
                } finally {
                    setLoading(false);
                }
            });

            // Toggle password visibility
            togglePassword.addEventListener('click', (e) => {
                e.preventDefault();
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                eyeOpen.classList.toggle('hidden');
                eyeClosed.classList.toggle('hidden');
                passwordInput.focus();
            });

            // Toggle between login and signup
            toggleModeBtn.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                
                if (isLoginMode) {
                    formTitle.textContent = 'Welcome Back';
                    formSubtitle.textContent = 'Sign in to continue watching';
                    toggleText.textContent = "Don't have an account?";
                    toggleModeBtn.textContent = 'Sign Up';
                    submitText.textContent = 'Sign In';
                    nameField.classList.add('hidden');
                    nameInput.removeAttribute('required');
                } else {
                    formTitle.textContent = 'Create Account';
                    formSubtitle.textContent = 'Start your streaming journey';
                    toggleText.textContent = 'Already have an account?';
                    toggleModeBtn.textContent = 'Sign In';
                    submitText.textContent = 'Sign Up';
                    nameField.classList.remove('hidden');
                    nameInput.setAttribute('required', 'true');
                    nameInput.focus();
                }

                hideError();
                window.StreamBox.DPadNav.updateFocusable(document.body, '[data-focusable]');
            });

            // Dismiss error
            dismissError.addEventListener('click', () => {
                hideError();
            });

            // Back button
            backBtn.addEventListener('click', () => {
                if (isLoginMode) {
                    window.history.back();
                } else {
                    isLoginMode = true;
                    formTitle.textContent = 'Welcome Back';
                    formSubtitle.textContent = 'Sign in to continue watching';
                    toggleText.textContent = "Don't have an account?";
                    toggleModeBtn.textContent = 'Sign Up';
                    submitText.textContent = 'Sign In';
                    nameField.classList.add('hidden');
                    nameInput.removeAttribute('required');
                    hideError();
                    window.StreamBox.DPadNav.updateFocusable(document.body, '[data-focusable]');
                }
            });

            // Helper functions
            function setLoading(loading) {
                submitBtn.disabled = loading;
                submitText.classList.toggle('hidden', loading);
                submitSpinner.classList.toggle('hidden', !loading);
                submitArrow.classList.toggle('hidden', loading);
            }

            function showError(message) {
                errorText.textContent = message;
                errorMessage.classList.remove('hidden');
                errorMessage.classList.add('animate-fade-in');
            }

            function hideError() {
                errorMessage.classList.add('hidden');
            }

            // Load remembered email
            const rememberedEmail = localStorage.getItem('rememberEmail');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('remember').checked = true;
                passwordInput.focus();
            }

            // Handle Enter key on inputs
            const inputs = form.querySelectorAll('input[data-focusable]');
            inputs.forEach(input => {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        submitBtn.focus();
                    }
                });
            });

            // Keyboard shortcuts for TV
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace') {
                    backBtn.click();
                }
            });
        });
    </script>
</body>
</html>
