<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamBox - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#fef2f2',
              100: '#fee2e2',
              200: '#fecaca',
              300: '#fca5a5',
              400: '#f87171',
              500: '#ef4444',
              600: '#dc2626',
              700: '#b91c1c',
              800: '#991b1b',
              900: '#7f1d1d',
              950: '#450a0a',
            },
            accent: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
              950: '#052e16',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scale-in {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes slide-up {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    .animate-fade-in { animation: fade-in 0.5s ease-out; }
    .animate-scale-in { animation: scale-in 0.3s ease-out; }
    .animate-slide-up { animation: slide-up 0.4s ease-out; }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    
    /* D-pad focus indicators */
    *:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.5), 0 0 0 6px rgba(220, 38, 38, 0.2);
    }
    
    /* TV-optimized large tap targets */
    .tv-focusable {
      min-height: 48px;
      min-width: 48px;
    }
    
    /* AMOLED pure black background */
    .amoled-black {
      background-color: #000000;
    }
  </style>
</head>
<body class="amoled-black min-h-screen flex flex-col text-white antialiased">
  <!-- Header -->
  <header class="border-b border-gray-800/50 backdrop-blur-sm sticky top-0 z-50 bg-black/80">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-600 to-primary-800 flex items-center justify-center shadow-lg">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">StreamBox</h1>
      </div>
      <button id="darkModeToggle" class="tv-focusable p-3 rounded-xl bg-gray-800/50 hover:bg-gray-700/50 transition-all duration-200 focus:ring-2 focus:ring-primary-500" aria-label="Toggle dark mode">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-md animate-scale-in">
      <!-- Auth Card -->
      <div class="bg-gray-900/80 backdrop-blur-xl rounded-2xl border border-gray-800 shadow-2xl overflow-hidden">
        <!-- Tab Navigation -->
        <div class="flex border-b border-gray-800">
          <button id="loginTab" class="tv-focusable flex-1 py-4 text-lg font-semibold transition-all duration-200 bg-primary-600 text-white" data-tab="login">
            Accedi
          </button>
          <button id="registerTab" class="tv-focusable flex-1 py-4 text-lg font-semibold transition-all duration-200 text-gray-400 hover:text-white hover:bg-gray-800/50" data-tab="register">
            Registrati
          </button>
        </div>

        <!-- Error Message Container -->
        <div id="errorContainer" class="hidden mx-6 mt-4 p-4 rounded-xl bg-red-900/30 border border-red-800/50 text-red-200 animate-shake">
          <div class="flex items-start gap-3">
            <svg class="w-5 h-5 mt-0.5 flex-shrink-0 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p id="errorMessage" class="text-sm"></p>
            <button id="dismissError" class="ml-auto flex-shrink-0 text-red-400 hover:text-red-300 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Success Message Container -->
        <div id="successContainer" class="hidden mx-6 mt-4 p-4 rounded-xl bg-green-900/30 border border-green-800/50 text-green-200 animate-slide-up">
          <div class="flex items-start gap-3">
            <svg class="w-5 h-5 mt-0.5 flex-shrink-0 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p id="successMessage" class="text-sm"></p>
          </div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="p-6 space-y-6 animate-fade-in">
          <div class="space-y-2">
            <label for="loginEmail" class="block text-sm font-medium text-gray-300">Email</label>
            <div class="relative">
              <input type="email" id="loginEmail" name="email" required
                class="tv-focusable w-full px-5 py-4 text-lg bg-gray-800/50 border-2 border-gray-700 rounded-xl text-white placeholder-gray-500 transition-all duration-200 focus:border-primary-500 focus:bg-gray-800"
                placeholder="La tua email">
              <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
              </svg>
            </div>
          </div>

          <div class="space-y-2">
            <label for="loginPassword" class="block text-sm font-medium text-gray-300">Password</label>
            <div class="relative">
              <input type="password" id="loginPassword" name="password" required
                class="tv-focusable w-full px-5 py-4 text-lg bg-gray-800/50 border-2 border-gray-700 rounded-xl text-white placeholder-gray-500 transition-all duration-200 focus:border-primary-500 focus:bg-gray800"
                placeholder="La tua password">
              <button type="button" id="toggleLoginPassword" class="tv-focusable absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors" aria-label="Toggle password visibility">
                <svg class="w-6 h-6 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <svg class="w-6 h-6 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="flex items-center">
            <input type="checkbox" id="rememberMe" name="remember"
              class="tv-focusable w-5 h-5 rounded border-gray-600 bg-gray-800 text-primary-600 focus:ring-primary-500 focus:ring-offset-0">
            <label for="rememberMe" class="ml-3 text-sm text-gray-300 cursor-pointer">Ricordami</label>
          </div>

          <button type="submit" id="loginSubmit" class="tv-focusable w-full py-4 px-6 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-500 hover:to-primary-600 text-white text-lg font-semibold rounded-xl shadow-lg shadow-primary-900/30 transition-all duration-200 transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
            <span id="loginBtnText">Accedi</span>
            <svg id="loginSpinner" class="hidden animate-spin w-5 h-5 mx-auto" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="p-6 space-y-6 hidden animate-fade-in">
          <div class="space-y-2">
            <label for="registerEmail" class="block text-sm font-medium text-gray-300">Email</label>
            <div class="relative">
              <input type="email" id="registerEmail" name="email" required
                class="tv-focusable w-full px-5 py-4 text-lg bg-gray-800/50 border-2 border-gray-700 rounded-xl text-white placeholder-gray-500 transition-all duration-200 focus:border-primary-500 focus:bg-gray-800"
                placeholder="La tua email">
              <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
              </svg>
            </div>
          </div>

          <div class="space-y-2">
            <label for="registerPassword" class="block text-sm font-medium text-gray-300">Password</label>
            <div class="relative">
              <input type="password" id="registerPassword" name="password" required minlength="6"
                class="tv-focusable w-full px-5 py-4 text-lg bg-gray-800/50 border-2 border-gray-700 rounded-xl text-white placeholder-gray-500 transition-all duration-200 focus:border-primary-500 focus:bg-gray-800"
                placeholder="Minimo 6 caratteri">
              <button type="button" id="toggleRegisterPassword" class="tv-focusable absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors" aria-label="Toggle password visibility">
                <svg class="w-6 h-6 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <svg class="w-6 h-6 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
            <p class="text-xs text-gray-500 mt-1">La password deve contenere almeno 6 caratteri</p>
          </div>

          <div class="space-y-2">
            <label for="confirmPassword" class="block text-sm font-medium text-gray-300">Conferma Password</label>
            <div class="relative">
              <input type="password" id="confirmPassword" name="confirmPassword" required
                class="tv-focusable w-full px-5 py-4 text-lg bg-gray-800/50 border-2 border-gray-700 rounded-xl text-white placeholder-gray-500 transition-all duration-200 focus:border-primary-500 focus:bg-gray-800"
                placeholder="Ripeti la password">
              <button type="button" id="toggleConfirmPassword" class="tv-focusable absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors" aria-label="Toggle password visibility">
                <svg class="w-6 h-6 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <svg class="w-6 h-6 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" id="registerSubmit" class="tv-focusable w-full py-4 px-6 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-500 hover:to-primary-600 text-white text-lg font-semibold rounded-xl shadow-lg shadow-primary-900/30 transition-all duration-200 transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
            <span id="registerBtnText">Crea Account</span>
            <svg id="registerSpinner" class="hidden animate-spin w-5 h-5 mx-auto" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>
        </form>
      </div>

      <!-- Footer Info -->
      <p class="text-center text-gray-500 text-sm mt-6 animate-fade-in">
        StreamBox Premium - Il tuo hub streaming
      </p>
    </div>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
    <div class="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl p-4 flex items-center gap-3">
      <div id="toastIcon" class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0"></div>
      <div>
        <p id="toastTitle" class="font-semibold text-sm"></p>
        <p id="toastMessage" class="text-xs text-gray-400"></p>
      </div>
    </div>
  </div>

  <script>
    // Dark mode management
    function initDarkMode() {
      const isDark = localStorage.getItem('darkMode') !== 'false';
      document.documentElement.classList.toggle('dark', isDark);
    }

    function toggleDark() {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('darkMode', isDark);
    }

    // Password visibility toggle
    function setupPasswordToggle(buttonId, inputId) {
      const button = document.getElementById(buttonId);
      const input = document.getElementById(inputId);
      const eyeOpen = button.querySelector('.eye-open');
      const eyeClosed = button.querySelector('.eye-closed');

      button.addEventListener('click', () => {
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        eyeOpen.classList.toggle('hidden', !isPassword);
        eyeClosed.classList.toggle('hidden', isPassword);
      });
    }

    // Error message display
    function showError(message) {
      const container = document.getElementById('errorContainer');
      const messageEl = document.getElementById('errorMessage');
      messageEl.textContent = message;
      container.classList.remove('hidden');
      container.classList.remove('animate-shake');
      void container.offsetWidth;
      container.classList.add('animate-shake');
      hideSuccess();
    }

    function hideError() {
      document.getElementById('errorContainer').classList.add('hidden');
    }

    // Success message display
    function showSuccess(message) {
      const container = document.getElementById('successContainer');
      const messageEl = document.getElementById('successMessage');
      messageEl.textContent = message;
      container.classList.remove('hidden');
      hideError();
    }

    function hideSuccess() {
      document.getElementById('successContainer').classList.add('hidden');
    }

    // Loading state
    function setLoading(buttonId, spinnerId, textId, isLoading, defaultText) {
      const button = document.getElementById(buttonId);
      const spinner = document.getElementById(spinnerId);
      const text = document.getElementById(textId);
      button.disabled = isLoading;
      spinner.classList.toggle('hidden', !isLoading);
      text.classList.toggle('hidden', isLoading);
    }

    // Toast notification
    function showToast(type, title, message) {
      const toast = document.getElementById('toast');
      const toastIcon = document.getElementById('toastIcon');
      const toastTitle = document.getElementById('toastTitle');
      const toastMessage = document.getElementById('toastMessage');

      const icons = {
        success: { bg: 'bg-green-500', svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>' },
        error: { bg: 'bg-red-500', svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>' },
        info: { bg: 'bg-blue-500', svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>' }
      };

      const icon = icons[type] || icons.info;
      toastIcon.className = `w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${icon.bg}`;
      toastIcon.innerHTML = `<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icon.svg}</svg>`;
      toastTitle.textContent = title;
      toastMessage.textContent = message;

      toast.classList.remove('translate-y-20', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');

      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
        toast.classList.remove('translate-y-0', 'opacity-100');
      }, 3000);
    }

    // Tab switching
    function setupTabs() {
      const loginTab = document.getElementById('loginTab');
      const registerTab = document.getElementById('registerTab');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      function switchTab(tab) {
        hideError();
        hideSuccess();
        
        if (tab === 'login') {
          loginTab.classList.add('bg-primary-600', 'text-white');
          loginTab.classList.remove('text-gray-400', 'hover:text-white', 'hover:bg-gray-800/50');
          registerTab.classList.remove('bg-primary-600', 'text-white');
          registerTab.classList.add('text-gray-400', 'hover:text-white', 'hover:bg-gray-800/50');
          loginForm.classList.remove('hidden');
          registerForm.classList.add('hidden');
        } else {
          registerTab.classList.add('bg-primary-600', 'text-white');
          registerTab.classList.remove('text-gray-400', 'hover:text-white', 'hover:bg-gray-800/50');
          loginTab.classList.remove('bg-primary-600', 'text-white');
          loginTab.classList.add('text-gray-400', 'hover:text-white', 'hover:bg-gray-800/50');
          registerForm.classList.remove('hidden');
          loginForm.classList.add('hidden');
        }
      }

      loginTab.addEventListener('click', () => switchTab('login'));
      registerTab.addEventListener('click', () => switchTab('register'));
    }

    // API helper
    async function apiCall(endpoint, options = {}) {
      try {
        const response = await fetch(endpoint, {
          headers: {
            'Content-Type': 'application/json',
            ...options.headers
          },
          ...options
        });

        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Request failed');
        }
        
        return data;
      } catch (error) {
        throw error;
      }
    }

    // Store auth tokens
    function storeTokens(accessToken, refreshToken, rememberMe = false) {
      localStorage.setItem('accessToken', accessToken);
      localStorage.setItem('refreshToken', refreshToken);
      localStorage.setItem('tokenTimestamp', Date.now().toString());
    }

    // Clear auth tokens
    function clearTokens() {
      localStorage.removeItem('accessToken');
      localStorage.removeItem('refreshToken');
      localStorage.removeItem('tokenTimestamp');
    }

    // Handle login
    async function handleLogin(event) {
      event.preventDefault();
      hideError();
      hideSuccess();

      const formData = new FormData(event.target);
      const email = formData.get('email').trim();
      const password = formData.get('password');
      const remember = formData.get('remember') === 'on';

      setLoading('loginSubmit', 'loginSpinner', 'loginBtnText', true, 'Accedi');

      try {
        const data = await apiCall('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        if (data.success) {
          storeTokens(data.data.accessToken, data.data.refreshToken, remember);
          showSuccess('Accesso effettuato con successo!');
          showToast('success', 'Benvenuto!', 'Accesso effettuato con successo');
          
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        }
      } catch (error) {
        showError(error.message || 'Accesso fallito. Controlla le credenziali.');
        showToast('error', 'Errore', error.message || 'Accesso fallito');
      } finally {
        setLoading('loginSubmit', 'loginSpinner', 'loginBtnText', false, 'Accedi');
      }
    }

    // Handle registration
    async function handleRegister(event) {
      event.preventDefault();
      hideError();
      hideSuccess();

      const formData = new FormData(event.target);
      const email = formData.get('email').trim();
      const password = formData.get('password');
      const confirmPassword = formData.get('confirmPassword');

      // Client-side validation
      if (password !== confirmPassword) {
        showError('Le password non coincidono.');
        return;
      }

      if (password.length < 6) {
        showError('La password deve contenere almeno 6 caratteri.');
        return;
      }

      setLoading('registerSubmit', 'registerSpinner', 'registerBtnText', true, 'Crea Account');

      try {
        const data = await apiCall('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        if (data.success) {
          storeTokens(data.data.accessToken, data.data.refreshToken);
          showSuccess('Account creato con successo!');
          showToast('success', 'Benvenuto!', 'Account creato con successo');
          
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        }
      } catch (error) {
        showError(error.message || 'Registrazione fallita. L\'email potrebbe essere già in uso.');
        showToast('error', 'Errore', error.message || 'Registrazione fallita');
      } finally {
        setLoading('registerSubmit', 'registerSpinner', 'registerBtnText', false, 'Crea Account');
      }
    }

    // D-pad navigation support
    function setupDPadNavigation() {
      const focusableElements = document.querySelectorAll('.tv-focusable');
      focusableElements.forEach((el, index) => {
        el.dataset.index = index;
      });

      document.addEventListener('keydown', (e) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
          const currentFocus = document.activeElement;
          if (!currentFocus || !currentFocus.classList.contains('tv-focusable')) {
            return;
          }

          e.preventDefault();
          const currentIndex = parseInt(currentFocus.dataset.index);
          const elements = Array.from(focusableElements);
          let nextIndex = currentIndex;

          switch (e.key) {
            case 'ArrowDown':
              nextIndex = Math.min(currentIndex + 1, elements.length - 1);
              break;
            case 'ArrowUp':
              nextIndex = Math.max(currentIndex - 1, 0);
              break;
            case 'ArrowRight':
              nextIndex = Math.min(currentIndex + 1, elements.length - 1);
              break;
            case 'ArrowLeft':
              nextIndex = Math.max(currentIndex - 1, 0);
              break;
          }

          if (nextIndex !== currentIndex) {
            elements[nextIndex].focus();
            elements[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }

        if (e.key === 'Enter' && document.activeElement) {
          const activeElement = document.activeElement;
          if (activeElement.tagName === 'INPUT' && activeElement.type !== 'checkbox') {
            e.preventDefault();
            return;
          }
        }
      });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initDarkMode();
      setupTabs();
      setupPasswordToggle('toggleLoginPassword', 'loginPassword');
      setupPasswordToggle('toggleRegisterPassword', 'registerPassword');
      setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');

      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      document.getElementById('registerForm').addEventListener('submit', handleRegister);
      document.getElementById('darkModeToggle').addEventListener('click', toggleDark);
      document.getElementById('dismissError').addEventListener('click', hideError);

      // Check if already authenticated
      const token = localStorage.getItem('accessToken');
      if (token) {
        fetch('/api/user/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        }).then(res => {
          if (res.ok) {
            window.location.href = '/';
          }
        }).catch(() => {});
      }

      // Enable D-pad navigation for TV
      setupDPadNavigation();
    });
  </script>
</body>
</html>
